name: maimaid-local

services:
  postgres:
    build:
      context: ./docker/postgres
    environment:
      POSTGRES_DB: maimaid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=maimaid
    ports:
      - "54329:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maimaid"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin123; do
        echo 'waiting minio...';
        sleep 1;
      done;
      mc mb --ignore-existing local/maimaid-assets;
      mc anonymous set none local/maimaid-assets || true;
      "
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.docker
        required: true
      - path: .env.docker.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8787:8787"
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
