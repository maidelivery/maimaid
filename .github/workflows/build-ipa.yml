name: Build maimaid IPA

"on":
  push:
    paths:
      - ios/**
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project ios/maimaid.xcodeproj \
            -scheme maimaid \
            -resolvePackageDependencies

      - name: Archive app (unsigned)
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/maimaid.xcarchive
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p build
          LOG_PATH="$PWD/build/archive.log"
          RESULT_BUNDLE_PATH="$PWD/build/maimaid.xcresult"
          : "${SUPABASE_URL:?Missing GitHub Secret SUPABASE_URL}"
          : "${SUPABASE_PUBLISHABLE_KEY:?Missing GitHub Secret SUPABASE_PUBLISHABLE_KEY}"
          if ! xcodebuild \
            -project ios/maimaid.xcodeproj \
            -scheme maimaid \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            SUPABASE_URL="$SUPABASE_URL" \
            SUPABASE_PUBLISHABLE_KEY="$SUPABASE_PUBLISHABLE_KEY" \
            archive \
            -archivePath "$ARCHIVE_PATH" \
            -resultBundlePath "$RESULT_BUNDLE_PATH" 2>&1 | tee "$LOG_PATH"; then
            echo "Archive failed. Extracting error lines:"
            grep -nE "error:|fatal error:|FAILED|failure" "$LOG_PATH" || true
            exit 1
          fi
          APP_PATH="$ARCHIVE_PATH/Products/Applications/maimaid.app"
          test -d "$APP_PATH"
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/maimaid.app
          cd build
          /usr/bin/zip -qry maimaid.ipa Payload
          ls -lh maimaid.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: maimaid-ipa-${{ github.sha }}
          path: build/maimaid.ipa
          if-no-files-found: error

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maimaid-build-diagnostics-${{ github.sha }}
          path: |
            build/archive.log
            build/maimaid.xcresult
          if-no-files-found: warn
