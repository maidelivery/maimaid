name: maimaid-local

services:
  postgres:
    build:
      context: ./docker/postgres
    environment:
      POSTGRES_DB: maimaid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=maimaid
    ports:
      - "54329:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maimaid"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - path: .env.docker
        required: true
      - path: .env.docker.local
        required: false
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    env_file:
      - path: .env.docker
        required: true
      - path: .env.docker.local
        required: false
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - /init.sh
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.docker
        required: true
      - path: .env.docker.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8787:8787"
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
